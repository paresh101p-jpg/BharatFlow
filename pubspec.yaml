name: bharat_flow
description: A hyper-scalable, AI-first citizen utility super app.
version: 1.0.12+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.0.0
  google_sign_in: ^6.1.6
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  glassmorphism: ^3.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  latlong2: ^0.9.1
  flutter_map: ^6.1.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  dio: ^5.4.0
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.2
  permission_handler: ^11.3.1
  smooth_page_indicator: ^1.1.0
  url_launcher: ^6.2.4
  translator: ^1.0.4+1
  google_generative_ai: ^0.4.0
  share_plus: ^9.0.0      # WhatsApp share ke liye
  path_provider: ^2.1.2
  http: ^1.2.0            # News API call ke liye
  image_picker: ^1.0.7
  workmanager: ^0.5.2     # Background task ke liye
  flutter_local_notifications: ^17.1.2 # Notification dikhane ke liye
  syncfusion_flutter_gauges: ^25.1.37
  fl_chart: ^0.66.2
  firebase_core: ^3.0.0
  firebase_messaging: ^15.1.0
  timezone: ^0.9.4
  searchfield: ^1.2.1
  google_mobile_ads: ^3.1.0
  in_app_update: ^4.2.5
  speech_to_text: ^6.6.2
  google_maps_flutter: ^2.5.3
  maps_toolkit: ^3.0.0
  firebase_analytics: ^11.3.0
  screenshot: ^3.0.0
  screenshot_callback: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
