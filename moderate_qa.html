<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatFlow Q&A Moderation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2E7D32; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        textarea { resize: vertical; min-height: 100px; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-approve { background: #4CAF50; }
        .btn-approve:hover { background: #388E3C; }
        .btn-reject { background: #F44336; }
        .btn-reject:hover { background: #D32F2F; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; text-align: center; }
        .success { background: #e8f5e9; color: #2e7d32; display: block; }
        .error { background: #ffebee; color: #c62828; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛠️ Moderate Q&A</h2>
        <p style="color: #666; margin-bottom: 25px;">Approve this question to make it public, provide an expert answer, or reject it with a reason.</p>
        
        <div class="form-group">
            <label>Question ID (Auto-filled)</label>
            <input type="text" id="questionId" readonly style="background:#eee;">
        </div>

        <div class="form-group">
            <label>Expert Answer (Optional - Leave blank to just approve)</label>
            <textarea id="answerText" placeholder="Write your answer here..."></textarea>
        </div>

        <div class="form-group">
            <label>Rejection Reason (Only if Rejecting)</label>
            <input type="text" id="rejectReason" placeholder="Why are you rejecting this? (e.g., Spam, Irrelevant)">
        </div>

        <div class="form-group">
            <label>Security Token</label>
            <input type="text" id="token" placeholder="Enter admin token">
        </div>

        <div class="btn-group">
            <button class="btn-reject" onclick="moderate('reject')">❌ Reject</button>
            <button class="btn-approve" onclick="moderate('approve')">✅ Approve & Publish</button>
        </div>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // Get Question ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('questionId').value = urlParams.get('id') || '';
        document.getElementById('token').value = localStorage.getItem('qa_admin_token') || '';

        async function moderate(action) {
            const questionId = document.getElementById('questionId').value;
            const answer = document.getElementById('answerText').value;
            const reason = document.getElementById('rejectReason').value;
            const token = document.getElementById('token').value;
            const statusDiv = document.getElementById('statusMessage');

            if (!questionId) {
                showStatus('Error: Question ID is missing.', 'error');
                return;
            }
            if (!token) {
                showStatus('Error: Security token is required.', 'error');
                return;
            }
            if (action === 'reject' && !reason) {
                showStatus('Error: Rejection reason is required to reject.', 'error');
                return;
            }

            // Save token for next time
            localStorage.setItem('qa_admin_token', token);
            
            showStatus('Processing...', 'success');

            try {
                const response = await fetch('https://wkhelvyqudzyzbrayyqo.supabase.co/functions/v1/moderate_qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question_id: questionId, action, answer, reason, token })
                });

                const result = await response.json();
                
                if (response.ok) {
                    showStatus('Success: ' + result.message, 'success');
                    document.querySelector('.btn-group').style.display = 'none';
                } else {
                    showStatus('Error: ' + (result.error || 'Failed to process request'), 'error');
                }
            } catch (error) {
                showStatus('Error: Could not connect to server.', 'error');
            }
        }

        function showStatus(text, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + type;
        }
    </script>
</body>
</html>
